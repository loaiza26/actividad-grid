<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nuevo Video</title>
<style>
.video-container {
    position: relative;
    padding-bottom: 56.25%; /* 16:9 aspect ratio */
    height: 0;
    overflow: hidden;
    max-width: 100%;
    background: #000;
}
.video-container iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}
</style>
</head>
<body>

<h1>Nuevo Video</h1>

<div class="video-container">
<iframe 
src="https://www.youtube.com/embed/A9WpnUdHLhw"
frameborder="0"
allowfullscreen>
</iframe>
</div>

<br><br>
<a href="index.html">⬅ Volver</a>

</body>
</html>
